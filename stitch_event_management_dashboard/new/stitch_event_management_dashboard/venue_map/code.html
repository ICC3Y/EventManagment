<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Venue Map</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary": "#e2e2e2",
                        "on-primary-container": "#000000",
                        "inverse-primary": "#5d5f5f",
                        "secondary-fixed-dim": "#ababb0",
                        "surface-container-low": "#1b1b1b",
                        "on-surface-variant": "#c6c6c6",
                        "inverse-surface": "#e2e2e2",
                        "surface-dim": "#131313",
                        "surface-container-high": "#2a2a2a",
                        "surface-container-lowest": "#0e0e0e",
                        "surface-bright": "#393939",
                        "background": "#131313",
                        "error": "#ffb4ab",
                        "on-primary-fixed-variant": "#e2e2e2",
                        "on-tertiary-container": "#000000",
                        "on-secondary-container": "#e3e2e7",
                        "outline": "#919191",
                        "secondary-container": "#46464b",
                        "on-secondary-fixed-variant": "#3a3b3f",
                        "primary-container": "#d4d4d4",
                        "on-secondary-fixed": "#1a1b1f",
                        "primary-fixed": "#5d5f5f",
                        "tertiary-fixed-dim": "#474747",
                        "secondary": "#c6c6cb",
                        "primary-fixed-dim": "#454747",
                        "inverse-on-surface": "#303030",
                        "surface-container": "#1f1f1f",
                        "primary": "#ffffff",
                        "on-secondary": "#1a1b1f",
                        "on-error-container": "#ffdad6",
                        "on-tertiary": "#1b1b1b",
                        "outline-variant": "#474747",
                        "surface-variant": "#353535",
                        "surface-container-highest": "#353535",
                        "on-error": "#690005",
                        "on-surface": "#e2e2e2",
                        "error-container": "#93000a",
                        "surface-tint": "#c6c6c7",
                        "secondary-fixed": "#c6c6cb",
                        "on-primary-fixed": "#ffffff",
                        "on-background": "#e2e2e2",
                        "surface": "#131313",
                        "on-primary": "#1a1c1c",
                        "tertiary-fixed": "#5e5e5e",
                        "tertiary-container": "#919191",
                        "on-tertiary-fixed-variant": "#e2e2e2",
                        "on-tertiary-fixed": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Plus Jakarta Sans"],
                        "label": ["Plus Jakarta Sans"]
                    }
                }
            }
        }
    </script>
<style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 24; }
        .material-symbols-outlined.fill { font-variation-settings: 'FILL' 1; }
        
        /* Map specific styling for the cinematic noir look */
        .map-bg {
            background-image: radial-gradient(circle at center, #1b1b1b 0%, #131313 100%);
        }
        .grid-overlay {
            background-size: 40px 40px;
            background-image: linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
        }
        
        /* Pulse Animation (Requested by user despite general rule, creating CSS version to avoid JS) */
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(2.5); opacity: 0; }
        }
        .pulse-marker::before {
            content: '';
            position: absolute;
            left: -100%;
            top: -100%;
            width: 300%;
            height: 300%;
            background-color: #ffffff;
            border-radius: 50%;
            z-index: -1;
            animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface h-screen overflow-hidden flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex items-center px-6 h-16 bg-zinc-950/80 backdrop-blur-xl shadow-[0_0_1px_rgba(255,255,255,0.1)]">
<button aria-label="Go back" class="text-white hover:text-white transition-colors duration-300 active:scale-95 mr-4">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-['Plus_Jakarta_Sans'] tracking-tight font-bold text-lg text-white">Venue Map</h1>
</header>
<!-- Map Canvas Area -->
<main class="flex-grow relative map-bg grid-overlay pt-16 pb-20 md:pb-0">
<!-- Map Content Layer (Simplified visual representation of a venue) -->
<div class="absolute inset-0 z-0 flex items-center justify-center overflow-hidden">
<!-- Simulated structural elements of a venue -->
<div class="relative w-[120%] h-[120%] md:w-[80%] md:h-[80%] opacity-20">
<!-- Outer walls -->
<div class="absolute inset-4 border border-outline-variant rounded-xl"></div>
<!-- Main Hall -->
<div class="absolute top-[20%] left-[20%] right-[20%] bottom-[40%] border border-outline-variant/50 rounded-lg"></div>
<!-- Sections -->
<div class="absolute top-[65%] left-[20%] w-[25%] h-[20%] border border-outline-variant/30 rounded-lg"></div>
<div class="absolute top-[65%] right-[20%] w-[25%] h-[20%] border border-outline-variant/30 rounded-lg"></div>
<!-- Paths -->
<svg class="absolute inset-0 w-full h-full stroke-outline-variant/20 stroke-[2] fill-none" preserveaspectratio="none">
<path d="M 0 50 L 1000 50 M 200 0 L 200 1000 M 800 0 L 800 1000" vector-effect="non-scaling-stroke"></path>
</svg>
</div>
</div>
<!-- Interactive Map Markers Layer -->
<div class="absolute inset-0 z-10 pointer-events-none">
<!-- User Location Marker -->
<div class="absolute top-[70%] left-[35%] transform -translate-x-1/2 -translate-y-1/2 flex flex-col items-center pointer-events-auto group cursor-pointer">
<div class="relative pulse-marker w-4 h-4 bg-primary rounded-full shadow-[0_0_10px_rgba(255,255,255,0.8)] z-10"></div>
<div class="mt-2 px-3 py-1 bg-surface-container-highest/90 backdrop-blur-md rounded text-xs font-label tracking-wide uppercase text-primary shadow-[0_4px_20px_rgba(0,0,0,0.4),0_0_1px_rgba(255,255,255,0.1)] opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                    You
                </div>
</div>
<!-- Main Stage / Destination Marker -->
<div class="absolute top-[35%] left-[55%] transform -translate-x-1/2 -translate-y-1/2 flex flex-col items-center pointer-events-auto cursor-pointer">
<div class="w-8 h-8 bg-surface-container-highest rounded-full flex items-center justify-center shadow-[0_4px_20px_rgba(0,0,0,0.4),0_0_1px_rgba(255,255,255,0.1)] border border-outline-variant/30 z-10">
<span class="material-symbols-outlined text-primary text-sm fill">star</span>
</div>
<div class="mt-2 px-3 py-1 bg-surface-container/80 backdrop-blur-md rounded text-xs font-label tracking-wide uppercase text-on-surface-variant border border-outline-variant/15">
                    Main Stage
                </div>
</div>
<!-- Secondary POI Marker -->
<div class="absolute top-[45%] left-[25%] transform -translate-x-1/2 -translate-y-1/2 flex flex-col items-center pointer-events-auto cursor-pointer opacity-70">
<div class="w-6 h-6 bg-surface-container-low rounded-full flex items-center justify-center border border-outline-variant/15 z-10">
<span class="material-symbols-outlined text-on-surface-variant text-xs">restaurant</span>
</div>
</div>
<!-- Secondary POI Marker -->
<div class="absolute top-[75%] right-[30%] transform -translate-x-1/2 -translate-y-1/2 flex flex-col items-center pointer-events-auto cursor-pointer opacity-70">
<div class="w-6 h-6 bg-surface-container-low rounded-full flex items-center justify-center border border-outline-variant/15 z-10">
<span class="material-symbols-outlined text-on-surface-variant text-xs">wc</span>
</div>
</div>
<!-- Route Line (SVG) -->
<svg class="absolute inset-0 w-full h-full pointer-events-none z-0 opacity-40" preserveaspectratio="none">
<path d="M 35% 70% Q 35% 50%, 45% 50% T 55% 35%" fill="none" stroke="#FFFFFF" stroke-dasharray="6,6" stroke-width="2" vector-effect="non-scaling-stroke"></path>
</svg>
</div>
<!-- Floating Location Details Overlay -->
<div class="absolute bottom-24 md:bottom-8 left-4 right-4 md:left-auto md:right-8 md:w-80 z-20">
<div class="bg-surface-container/70 backdrop-blur-[20px] rounded-lg p-5 shadow-[0_4px_20px_rgba(0,0,0,0.4),0_0_1px_rgba(255,255,255,0.1)]">
<div class="flex justify-between items-start mb-4">
<div>
<h2 class="font-headline font-bold text-xl text-primary mb-1 tracking-tight">Main Stage</h2>
<p class="font-body text-sm text-on-surface-variant">Hall A, Keynote Area</p>
</div>
<button class="w-8 h-8 rounded-full bg-surface-container-highest flex items-center justify-center hover:bg-surface-bright transition-colors">
<span class="material-symbols-outlined text-primary text-sm">close</span>
</button>
</div>
<div class="flex items-center gap-3 mb-6 p-3 bg-surface-container-low rounded border border-outline-variant/15">
<span class="material-symbols-outlined text-secondary text-lg">directions_walk</span>
<div class="flex-grow">
<div class="font-label text-[10px] uppercase tracking-widest text-secondary mb-0.5">Estimated Time</div>
<div class="font-body text-sm text-primary">5 mins <span class="text-on-surface-variant">(250m)</span></div>
</div>
</div>
<button class="w-full h-12 bg-primary text-on-primary font-label text-sm uppercase tracking-wide font-bold rounded flex items-center justify-center gap-2 hover:bg-primary-container transition-colors">
<span class="material-symbols-outlined text-on-primary">navigation</span>
                    Get Directions
                </button>
</div>
</div>
<!-- Map Controls -->
<div class="absolute top-20 right-4 z-20 flex flex-col gap-2">
<button class="w-10 h-10 bg-surface-container-highest/80 backdrop-blur-md rounded shadow-[0_4px_20px_rgba(0,0,0,0.4),0_0_1px_rgba(255,255,255,0.1)] flex items-center justify-center text-primary hover:bg-surface-bright transition-colors border border-outline-variant/15">
<span class="material-symbols-outlined">my_location</span>
</button>
<div class="flex flex-col bg-surface-container-highest/80 backdrop-blur-md rounded shadow-[0_4px_20px_rgba(0,0,0,0.4),0_0_1px_rgba(255,255,255,0.1)] overflow-hidden border border-outline-variant/15 mt-4">
<button class="w-10 h-10 flex items-center justify-center text-primary hover:bg-surface-bright transition-colors">
<span class="material-symbols-outlined">add</span>
</button>
<div class="w-full h-[1px] bg-outline-variant/30"></div>
<button class="w-10 h-10 flex items-center justify-center text-primary hover:bg-surface-bright transition-colors">
<span class="material-symbols-outlined">remove</span>
</button>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="md:hidden fixed bottom-0 w-full z-50 flex justify-around items-center h-20 px-4 pb-safe bg-zinc-950/90 backdrop-blur-2xl shadow-[0_-4px_20px_rgba(0,0,0,0.4)] rounded-t-lg">
<a class="flex flex-col items-center justify-center text-white scale-110 active:scale-90 duration-200 hover:text-zinc-200 transition-all" href="#">
<span class="material-symbols-outlined mb-1">explore</span>
<span class="font-['Plus_Jakarta_Sans'] text-[10px] uppercase tracking-[0.05em] font-medium">Explore</span>
</a>
<a class="flex flex-col items-center justify-center text-zinc-500 active:scale-90 duration-200 hover:text-zinc-200 transition-all" href="#">
<span class="material-symbols-outlined mb-1">calendar_today</span>
<span class="font-['Plus_Jakarta_Sans'] text-[10px] uppercase tracking-[0.05em] font-medium">Schedule</span>
</a>
<a class="flex flex-col items-center justify-center text-zinc-500 active:scale-90 duration-200 hover:text-zinc-200 transition-all" href="#">
<span class="material-symbols-outlined mb-1">confirmation_number</span>
<span class="font-['Plus_Jakarta_Sans'] text-[10px] uppercase tracking-[0.05em] font-medium">Tickets</span>
</a>
<a class="flex flex-col items-center justify-center text-zinc-500 active:scale-90 duration-200 hover:text-zinc-200 transition-all" href="#">
<span class="material-symbols-outlined mb-1">person</span>
<span class="font-['Plus_Jakarta_Sans'] text-[10px] uppercase tracking-[0.05em] font-medium">Profile</span>
</a>
</nav>
</body></html>
